# For age-restricted videos, yt-dlp can pull cookies from a logged-in browser.
# Supported: chrome, safari, firefox, edge, brave, opera, vivaldi, chromium (use for Arc).
cookies_from_browser: chrome

pack:
  name: schlangemann
  display_name: Schlangemann
  version: 0.1.1
  description: Sounds from Schlangemann YouTube videos
  author:
    name: Fredrik Säfstén
    github: oliban
  license: fair-use
  language: de

videos:
